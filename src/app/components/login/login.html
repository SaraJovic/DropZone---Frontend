<div class="container py-5 mt-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="dz-card auth-card p-5">
        <h2 class="text-center mb-4 auth-title">Login</h2>

        @if (errorMessage) {
          <div class="alert alert-danger mb-4 text-center">{{ errorMessage }}</div>
        }

        <form (ngSubmit)="onSubmit()">
          <div class="mb-4">
            <label class="form-label auth-label">Email Address</label>
            <input type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
          </div>
          <div class="mb-4">
            <label class="form-label auth-label">Password</label>
            <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
            <div class="text-end mt-1">
              <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
            </div>
          </div>
          <button type="submit" class="btn-volt w-100 mt-2">Sign In</button>
        </form>

        <p class="text-center mt-4 mb-0 auth-footer-text">
          Don't have an account? <a routerLink="/register">Register</a>
        </p>
      </div>
    </div>
  </div>
</div>
