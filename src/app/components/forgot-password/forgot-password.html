<div class="container py-5 mt-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="dz-card auth-card p-5">
        <h2 class="text-center mb-2 auth-title">Forgot Password</h2>
        <p class="text-center mb-4 auth-subtitle">Enter your email and we'll send you a reset link.</p>

        @if (successMessage) {
          <div class="alert alert-success mb-4 text-center">{{ successMessage }}</div>
        }
        @if (errorMessage) {
          <div class="alert alert-danger mb-4 text-center">{{ errorMessage }}</div>
        }

        @if (!successMessage) {
          <form (ngSubmit)="onSubmit()">
            <div class="mb-4">
              <label class="form-label auth-label">Email Address</label>
              <input type="email" class="form-control" [(ngModel)]="email" name="email"
                     placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn-volt w-100 mt-2" [disabled]="isLoading">
              @if (isLoading) {
                <span class="spinner-border spinner-border-sm me-2"></span>Sending...
              } @else {
                Send Reset Link
              }
            </button>
          </form>
        }

        <p class="text-center mt-4 mb-0 auth-footer-text">
          Remember your password? <a routerLink="/login">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
