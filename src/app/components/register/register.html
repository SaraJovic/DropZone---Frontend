<div class="container py-5 mt-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="dz-card auth-card p-5">
        <h2 class="text-center mb-4 auth-title">Register</h2>

        @if (errorMessage) {
          <div class="alert alert-danger mb-4 text-center">{{ errorMessage }}</div>
        }

        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label auth-label">First Name</label>
            <input type="text" class="form-control" [(ngModel)]="firstName" name="firstName" placeholder="Enter your first name" required>
          </div>
          <div class="mb-3">
            <label class="form-label auth-label">Last Name</label>
            <input type="text" class="form-control" [(ngModel)]="lastName" name="lastName" placeholder="Enter your last name" required>
          </div>
          <div class="mb-3">
            <label class="form-label auth-label">Email Address</label>
            <input type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
          </div>
          <div class="mb-4">
            <label class="form-label auth-label">Password</label>
            <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Min 6 characters" required minlength="6">
          </div>
          <button type="submit" class="btn-volt w-100 mt-2">Create Account</button>
        </form>

        <p class="text-center mt-4 mb-0 auth-footer-text">
          Already have an account? <a routerLink="/login">Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
