<div class="container py-5 mt-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="dz-card auth-card p-5">
        <h2 class="text-center mb-2 auth-title">Reset Password</h2>
        <p class="text-center mb-4 auth-subtitle">Enter your new password below.</p>

        @if (successMessage) {
          <div class="alert alert-success mb-4 text-center">{{ successMessage }}</div>
        }
        @if (errorMessage) {
          <div class="alert alert-danger mb-4 text-center">{{ errorMessage }}</div>
        }

        @if (!successMessage && token) {
          <form (ngSubmit)="onSubmit()">
            <div class="mb-4">
              <label class="form-label auth-label">New Password</label>
              <input type="password" class="form-control" [(ngModel)]="newPassword" name="newPassword"
                     placeholder="At least 6 characters" required>
            </div>
            <div class="mb-4">
              <label class="form-label auth-label">Confirm Password</label>
              <input type="password" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword"
                     placeholder="Repeat your new password" required>
            </div>
            <button type="submit" class="btn-volt w-100 mt-2" [disabled]="isLoading">
              @if (isLoading) {
                <span class="spinner-border spinner-border-sm me-2"></span>Resetting...
              } @else {
                Reset Password
              }
            </button>
          </form>
        }

        <p class="text-center mt-4 mb-0 auth-footer-text">
          <a routerLink="/login">Back to Sign In</a>
        </p>
      </div>
    </div>
  </div>
</div>
